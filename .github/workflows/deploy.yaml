name: Deploy ON Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Dependencies
        run: npm install
      - name: Install Dependencies
        run: npm run build
      - name: Health Check
        run: echo "Health Check Passed"